<!doctype html>
<html lang="en">
<head><meta charset="utf-8"><title>Newsletter sign-up (accessible)</title>
<style>body{font-family:system-ui,sans-serif;max-width:42rem;margin:2rem auto} .fakeheading{font-size:1.6rem;font-weight:700;margin:1.4rem 0 .4rem} table{border-collapse:collapse} td,th{border:1px solid #999;padding:.3rem .6rem} input{display:block;margin:.2rem 0 .9rem}</style>
</head>
<body>
<h1>Sign up</h1>
<form>
  <label for="email">Email address</label>
  <input type="email" id="email" name="email">
  <fieldset>
    <legend>Contact preference</legend>
    <input type="radio" id="p-email" name="pref"><label for="p-email">Email</label>
    <input type="radio" id="p-phone" name="pref"><label for="p-phone">Phone</label>
  </fieldset>
  <button type="submit">Subscribe</button>
</form>
</body>
</html>
