<!doctype html>
<html lang="en">
<head><meta charset="utf-8"><title>Settings (native controls with names and roles)</title>
<style>
body{font-family:system-ui,sans-serif;max-width:42rem;margin:2rem auto}
button{padding:.4rem .8rem}
.icon-btn{border:0;background:none;cursor:pointer}
</style>
</head>
<body>
<h1>Settings</h1>

<!-- Native button: announced "Save changes, button" -->
<button type="button" onclick="save()">Save changes</button>

<!-- Icon-only button with an accessible name: announced "Search, button" -->
<button class="icon-btn" type="button" aria-label="Search" onclick="search()"><svg width="20" height="20" aria-hidden="true"><circle cx="9" cy="9" r="6" fill="none" stroke="currentColor"/></svg></button>

<script>function save(){} function search(){}</script>
</body>
</html>
