<!doctype html>
<html lang="en">
<head><meta charset="utf-8"><title>About us (presentation role on layout table)</title>
<style>body{font-family:system-ui,sans-serif;max-width:42rem;margin:2rem auto} td{vertical-align:top;padding:.6rem}</style>
</head>
<body>
<h1>About us</h1>

<!-- The same two-column visual layout, but role="presentation" removes the
     table semantics from the accessibility tree, so the screen reader reads the
     content in order without announcing rows and columns that mean nothing. -->
<table role="presentation">
  <tr>
    <td>
      <h2>Our mission</h2>
      <p>We help local makers reach a wider audience.</p>
    </td>
    <td>
      <h2>Our story</h2>
      <p>Founded in 2019 by three friends in a garage.</p>
    </td>
  </tr>
</table>
</body>
</html>
